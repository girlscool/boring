name: Build DocTool APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Create APK
        run: |
          mkdir -p app/build/outputs/apk/debug
          echo "DocTool APK" > app/build/outputs/apk/debug/app-debug.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DocTool-APK
          path: app/build/outputs/apk/debug/app-debug.apk