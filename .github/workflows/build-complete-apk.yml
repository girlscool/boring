name: Build Complete DocTool APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: '34.0.0'
        ndk-version: '26.1.10909125'
        cmake-version: '3.22.1'
        
    - name: Accept Android SDK licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build with Gradle
      run: |
        # 显示Gradle版本
        ./gradlew --version
        
        # 清理并构建
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Verify APK exists
      run: |
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          echo "✅ APK构建成功!"
          echo "文件大小: $(stat -c%s "$APK_PATH") 字节"
          echo "文件路径: $APK_PATH"
        else
          echo "❌ APK文件未找到!"
          echo "检查构建目录:"
          find app/build -name "*.apk" -type f 2>/dev/null || echo "未找到APK文件"
          exit 1
        fi
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DocTool-Complete-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Create build summary
      run: |
        echo "## 🎉 DocTool 完整APK构建成功!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**构建信息:**" >> $GITHUB_STEP_SUMMARY
        echo "- 应用名称: DocTool" >> $GITHUB_STEP_SUMMARY
        echo "- 包名: com.doctool" >> $GITHUB_STEP_SUMMARY
        echo "- 版本: 1.0.0" >> $GITHUB_STEP_SUMMARY
        echo "- Android SDK: 34" >> $GITHUB_STEP_SUMMARY
        echo "- 构建时间: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**下载安装:**" >> $GITHUB_STEP_SUMMARY
        echo "1. 点击上方的 Artifacts 下载 APK" >> $GITHUB_STEP_SUMMARY
        echo "2. 传输到 Android 手机" >> $GITHUB_STEP_SUMMARY
        echo "3. 允许安装未知来源应用" >> $GITHUB_STEP_SUMMARY
        echo "4. 安装并测试完整功能" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**包含功能:**" >> $GITHUB_STEP_SUMMARY
        echo "✅ 文档参数编辑器" >> $GITHUB_STEP_SUMMARY
        echo "✅ 模板管理系统" >> $GITHUB_STEP_SUMMARY
        echo "✅ 5个预设模板" >> $GITHUB_STEP_SUMMARY
        echo "✅ 实时预览功能" >> $GITHUB_STEP_SUMMARY
        echo "✅ 三标签主界面" >> $GITHUB_STEP_SUMMARY
        
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          app/build/reports
          app/build/outputs/logs
        retention-days: 7