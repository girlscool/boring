name: Build DocTool APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: DocTool-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Generate Download Link
      run: |
        echo "APK构建完成！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "下载链接将在工作流完成后可用。" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "手动安装:" >> $GITHUB_STEP_SUMMARY
        echo "1. 下载上面的APK文件" >> $GITHUB_STEP_SUMMARY
        echo "2. 传输到Android手机" >> $GITHUB_STEP_SUMMARY
        echo "3. 在文件管理器中点击安装" >> $GITHUB_STEP_SUMMARY