name: Build DocTool APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: '34.0.0'
        ndk-version: '26.1.10909125'
        cmake-version: '3.22.1'
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Accept Android SDK licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DocTool-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        
    - name: Create APK Info
      run: |
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          echo "✅ APK构建成功!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**文件信息:**" >> $GITHUB_STEP_SUMMARY
          echo "- 文件名: app-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "- 包名: com.doctool" >> $GITHUB_STEP_SUMMARY
          echo "- 构建时间: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**安装说明:**" >> $GITHUB_STEP_SUMMARY
          echo "1. 下载上面的APK文件" >> $GITHUB_STEP_SUMMARY
          echo "2. 传输到Android手机" >> $GITHUB_STEP_SUMMARY
          echo "3. 允许安装未知来源应用" >> $GITHUB_STEP_SUMMARY
          echo "4. 在文件管理器中点击安装" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**测试功能:**" >> $GITHUB_STEP_SUMMARY
          echo "- 文档参数编辑器" >> $GITHUB_STEP_SUMMARY
          echo "- 模板管理系统" >> $GITHUB_STEP_SUMMARY
          echo "- 5个预设模板" >> $GITHUB_STEP_SUMMARY
          echo "- 实时预览功能" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ APK构建失败!" >> $GITHUB_STEP_SUMMARY
          echo "请检查构建日志" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports
          app/build/outputs/logs
        retention-days: 3